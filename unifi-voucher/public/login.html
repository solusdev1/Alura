<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Voucher Wi-Fi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c12;
      --surface: rgba(16, 22, 32, 0.85);
      --border: rgba(0, 212, 170, 0.15);
      --border-dim: rgba(255,255,255,0.06);
      --accent: #00d4aa;
      --accent2: #22d3ee;
      --text: #e8f0f7;
      --muted: #6b7e94;
      --danger: #f87171;
      --success: #34d399;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background grid */
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,170,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,170,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }
    .orb-1 {
      width: 520px; height: 520px;
      background: radial-gradient(circle, #00d4aa 0%, transparent 70%);
      top: -180px; left: -160px;
      animation: orb-float 9s ease-in-out infinite;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #22d3ee 0%, transparent 70%);
      bottom: -140px; right: -120px;
      animation: orb-float 12s ease-in-out infinite reverse;
    }

    @keyframes orb-float {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(30px, -20px); }
      66% { transform: translate(-20px, 30px); }
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-7px); }
      30%       { transform: translateX(7px); }
      45%       { transform: translateX(-5px); }
      60%       { transform: translateX(5px); }
      75%       { transform: translateX(-3px); }
      90%       { transform: translateX(3px); }
    }

    .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97); }

    .login-container {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 20px;
      padding: 44px 40px 36px;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(0,212,170,0.08),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(0,212,170,0.04);
      animation: card-in 0.55s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Top glow line */
    .login-container::before {
      content: '';
      position: absolute;
      top: 0; left: 10%; right: 10%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      border-radius: 50%;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .brand-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px rgba(0,212,170,0.35);
    }
    .brand-icon svg { width: 22px; height: 22px; fill: #000; }

    .brand-info { display: flex; flex-direction: column; gap: 2px; }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .brand-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,212,170,0.4); }
      50%       { opacity: 0.7; box-shadow: 0 0 0 4px rgba(0,212,170,0); }
    }

    .heading {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .heading .grad {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      margin-bottom: 32px;
      font-weight: 400;
    }

    .error-box {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.3);
      color: var(--danger);
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    .error-box.show { display: flex; }
    .error-box svg { flex-shrink: 0; width: 16px; height: 16px; fill: var(--danger); }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      color: var(--muted);
      pointer-events: none;
      display: flex;
    }
    .input-icon svg { width: 16px; height: 16px; fill: currentColor; }

    input {
      width: 100%;
      padding: 11px 12px 11px 40px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
      background: rgba(0,212,170,0.04);
      box-shadow: 0 0 0 3px rgba(0,212,170,0.1);
    }
    input::placeholder { color: var(--muted); opacity: 0.7; }

    .toggle-pass {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--text); }
    .toggle-pass svg { width: 17px; height: 17px; fill: currentColor; }

    .btn-submit {
      width: 100%;
      padding: 13px 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      margin-top: 8px;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover {
      opacity: 0.92;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,212,170,0.28);
    }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    .btn-submit.loading .btn-spinner { display: block; }
    .btn-submit.loading .btn-label { opacity: 0.7; }

    .card-footer {
      margin-top: 28px;
      padding-top: 18px;
      border-top: 1px solid var(--border-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .footer-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--success);
    }

    @media (max-width: 440px) {
      .login-container { padding: 36px 24px 28px; }
    }
  </style>
</head>
<body>
  <!-- ========================================================================
       EFEITOS VISUAIS DE FUNDO E CSS
       ======================================================================== -->
  <!-- 'bg-grid' desenha a grade, as 'orbs' desenham bolas de luz desfocadas -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- ========================================================================
       CAIXA DE LOGIN DO SISTEMA
       ======================================================================== -->
  <div class="login-container" id="loginCard">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24"><path d="M1 6.5C5.5 2 11 1 12 1s6.5 1 11 5.5L21 9.5C17.5 6 15 5 12 5s-5.5 1-9 4.5L1 6.5zM5 11c2-2 4.5-3 7-3s5 1 7 3l-2 2c-1.5-1.5-3-2-5-2s-3.5.5-5 2l-2-2zM12 16a3 3 0 100 6 3 3 0 000-6z"/></svg>
      </div>
      <div class="brand-info">
        <div class="brand-name">Unifi</div>
        <div class="brand-status"><span class="status-dot"></span>Sistema online</div>
      </div>
    </div>

    <h1 class="heading">Bem-vindo<br><span class="grad">de volta</span></h1>
    <p class="subtitle">Acesse o sistema de vouchers Wi-Fi</p>

    <!-- ALERTA DE ERRO: Inicia invisível ('display: none'). O script fará aparecer se o login falhar -->
    <div class="error-box" id="errorMsg" role="alert" aria-live="assertive" aria-atomic="true">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="errorText"></span>
    </div>

    <!-- FORMULÁRIO: Envolvido na tag '<form>' para capturar quando o usuário aperta 'Enter' no teclado -->
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Usuário</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
          </span>
          <input type="text" id="username" name="username" placeholder="Digite seu usuário" required autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/></svg>
          </span>
          <input type="password" id="password" name="password" placeholder="Digite sua senha" required autocomplete="current-password">
          <button type="button" class="toggle-pass" id="togglePass" aria-label="Mostrar/ocultar senha" tabindex="-1">
            <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="loginBtn">
        <div class="btn-spinner"></div>
        <span class="btn-label">Entrar</span>
      </button>
    </form>

    <div class="card-footer">
      <div class="footer-dot"></div>
      Servidor conectado
    </div>
  </div>

  <script>
    // ========================================================================
    // 1. AUTO-LOGIN SE JÁ TIVER UM TOKEN VÁLIDO
    // ========================================================================
    const existingToken = localStorage.getItem('token');
    if (existingToken) {
      fetch('/api/vouchers', {
        headers: { 'Authorization': `Bearer ${existingToken}` }
      }).then(res => {
        if (res.ok) {
          window.location.href = '/dashboard';
        } else {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
        }
      }).catch(() => {
        localStorage.removeItem('token');
        localStorage.removeItem('user');
      });
    }

    // ========================================================================
    // 2. CAPTURANDO OS ELEMENTOS DA TELA (DOM)
    // ========================================================================
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const loginCard = document.getElementById('loginCard');
    const togglePass = document.getElementById('togglePass');
    const eyeIcon = document.getElementById('eyeIcon');

    // ========================================================================
    // 3. FUNCIONALIDADE "MOSTRAR/OCULTAR SENHA"
    // ========================================================================
    togglePass.addEventListener('click', () => {
      const isPass = passwordInput.type === 'password';
      passwordInput.type = isPass ? 'text' : 'password';
      eyeIcon.innerHTML = isPass
        ? '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>'
        : '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
    });

    // ========================================================================
    // 4. FUNÇÃO QUE EXIBE MENSAGENS DE ERRO (E ANIMAÇÃO DE 'TREMER')
    // ========================================================================
    function showError(msg) {
      errorText.textContent = msg;
      errorMsg.classList.add('show');
      loginCard.classList.remove('shake');
      void loginCard.offsetWidth; // Truque de CSS para forçar a animação a rodar novamente (reflow)
      loginCard.classList.add('shake');
    }

    // ========================================================================
    // 5. EVENTO DE ENVIO DO FORMULÁRIO
    // ========================================================================
    loginForm.addEventListener('submit', async (e) => {
      // Impede a página de recarregar "nativamente", quem vai fazer o envio somos nós via código
      e.preventDefault();
      errorMsg.classList.remove('show');
      loginBtn.disabled = true;
      loginBtn.classList.add('loading');

      try {
        // Envia as credenciais para nossa API no Back-end
        const response = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: usernameInput.value,
            password: passwordInput.value
          })
        });

        const data = await response.json();

        if (response.ok && data.success) {
          // Se deu tudo certo, salva a 'Chave do Hotel' (Token) no bolso (localStorage) e vai pro painel
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard';
        } else {
          showError(data.error || 'Erro ao fazer login');
          loginBtn.disabled = false;
          loginBtn.classList.remove('loading');
          passwordInput.value = '';
          passwordInput.focus();
        }
      } catch (err) {
        showError('Erro de conexão: ' + err.message);
        loginBtn.disabled = false;
        loginBtn.classList.remove('loading');
      }
    });

    usernameInput.focus();
  </script>
</body>
</html>
